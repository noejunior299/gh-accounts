name: CI/CD Pipeline

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  lint:
    name: ShellCheck Linting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      
      - name: Run ShellCheck
        run: |
          echo "Checking shell scripts for syntax and style errors..."
          shellcheck -x bin/* lib/*.sh install.sh uninstall.sh
          echo "✅ All scripts passed ShellCheck!"

  test:
    name: BATS Test Suite
    runs-on: ubuntu-latest
    strategy:
      matrix:
        bash-version: ['5.x', '4.4']
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install BATS
        run: |
          sudo apt-get update
          sudo apt-get install -y bats
      
      - name: Run BATS tests
        run: |
          if [[ -d "tests" ]]; then
            bats tests/*.bats
          else
            echo "⚠️  No tests/ directory found yet. Skipping BATS tests."
          fi

  install:
    name: Installation Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Verify install script syntax
        run: bash -n install.sh
      
      - name: Verify uninstall script syntax
        run: bash -n uninstall.sh
      
      - name: Test library sourcing
        run: |
          set -e
          echo "Testing library imports..."
          bash -c 'source lib/utils.sh; source lib/config.sh; source lib/account.sh; source lib/agent.sh; source lib/backup.sh; source lib/doctor.sh'
          echo "✅ All libraries source correctly!"

  security:
    name: Security Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Check for hardcoded secrets
        run: |
          echo "Checking for potential secrets..."
          ! grep -r "password\|token\|secret\|api_key" bin/ lib/ --ignore-case | grep -v "\.md\|LICENSE" || true
      
      - name: Verify SSH key safety
        run: |
          echo "Checking SSH key generation practices..."
          grep -n "ssh-keygen" lib/account.sh || true

  powershell:
    name: PowerShell Validation
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify PowerShell module syntax
        shell: pwsh
        run: |
          $result = [System.Management.Automation.Language.Parser]::ParseFile("lib\GhAccounts.psm1", [ref]$null, [ref]$null)
          if ($result.Errors.Count -gt 0) {
            $result.Errors | ForEach-Object { Write-Error "$($_.Message) at line $($_.Extent.StartLine)" }
            exit 1
          }
          Write-Host "✅ GhAccounts.psm1: syntax OK"

      - name: Verify CLI entry point syntax
        shell: pwsh
        run: |
          $result = [System.Management.Automation.Language.Parser]::ParseFile("bin\gh-accounts.ps1", [ref]$null, [ref]$null)
          if ($result.Errors.Count -gt 0) {
            $result.Errors | ForEach-Object { Write-Error "$($_.Message) at line $($_.Extent.StartLine)" }
            exit 1
          }
          Write-Host "✅ gh-accounts.ps1: syntax OK"

      - name: Verify installer syntax
        shell: pwsh
        run: |
          $result = [System.Management.Automation.Language.Parser]::ParseFile("install.ps1", [ref]$null, [ref]$null)
          if ($result.Errors.Count -gt 0) {
            $result.Errors | ForEach-Object { Write-Error "$($_.Message) at line $($_.Extent.StartLine)" }
            exit 1
          }
          Write-Host "✅ install.ps1: syntax OK"

      - name: Verify uninstaller syntax
        shell: pwsh
        run: |
          $result = [System.Management.Automation.Language.Parser]::ParseFile("uninstall.ps1", [ref]$null, [ref]$null)
          if ($result.Errors.Count -gt 0) {
            $result.Errors | ForEach-Object { Write-Error "$($_.Message) at line $($_.Extent.StartLine)" }
            exit 1
          }
          Write-Host "✅ uninstall.ps1: syntax OK"

      - name: Test module import
        shell: pwsh
        run: |
          Import-Module "$env:GITHUB_WORKSPACE\lib\GhAccounts.psm1" -Force
          Write-Host "✅ Module imported successfully"
          $exported = Get-Module GhAccounts -ErrorAction Stop | Select-Object -ExpandProperty ExportedFunctions
          Write-Host "Exported functions: $($exported.Count)"

  coverage:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Count lines of code
        run: |
          echo "=== Project Statistics ==="
          echo "Total lines in libraries:"
          wc -l lib/*.sh
          echo ""
          echo "Total lines in bin:"
          wc -l bin/gh-accounts
      
      - name: List files
        run: |
          echo "=== Project Structure ==="
          find . -type f -name "*.sh" -o -name "*.md" | grep -v ".git" | sort
